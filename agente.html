<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agente IA — Realizzare Planejados</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a1a1a; --surface: #242424; --surface2: #2c2c2c; --border: #333;
      --gold: #c9a84c; --gold-lt: #f0c040; --text: #e8e8e8; --muted: #888;
      --danger: #e05252; --success: #52c07a; --warning: #e0993a;
    }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

    /* Header */
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; }
    .logo-sub { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
    .hdiv { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
    .badge-agente { display: inline-flex; align-items: center; gap: 5px; background: rgba(201,168,76,.1); border: 1px solid rgba(201,168,76,.25); color: var(--gold); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; }
    .badge-agente::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--gold); }
    .hspace { flex: 1; }
    .toggle-wrap { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--muted); }
    .toggle { position: relative; width: 40px; height: 22px; cursor: pointer; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: #444; border-radius: 22px; transition: .2s; }
    .toggle-slider::before { content:''; position:absolute; width:16px; height:16px; left:3px; top:3px; background:#888; border-radius:50%; transition:.2s; }
    .toggle input:checked + .toggle-slider { background: rgba(82,192,122,.3); }
    .toggle input:checked + .toggle-slider::before { background: var(--success); transform: translateX(18px); }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; letter-spacing: .5px; transition: .15s; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .btn-gold { background: var(--gold); color: #1a1a1a; }
    .btn-gold:hover { background: var(--gold-lt); }
    .btn-danger { background: rgba(224,82,82,.15); border: 1px solid rgba(224,82,82,.3); color: var(--danger); }
    .btn-success { background: rgba(82,192,122,.15); border: 1px solid rgba(82,192,122,.3); color: var(--success); }

    /* Layout */
    .main { max-width: 1400px; margin: 0 auto; padding: 24px; }

    /* Métricas */
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
    .metric-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .metric-value { font-size: 28px; font-weight: 700; line-height: 1; }
    .metric-value.gold { color: var(--gold); }
    .metric-value.success { color: var(--success); }
    .metric-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* Funil */
    .funil-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; margin-bottom: 24px; }
    .funil-title { font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }
    .funil-stages { display: flex; gap: 6px; align-items: flex-end; }
    .funil-stage { flex: 1; text-align: center; }
    .funil-bar-wrap { height: 60px; display: flex; align-items: flex-end; justify-content: center; margin-bottom: 8px; }
    .funil-bar { width: 100%; border-radius: 4px 4px 0 0; background: linear-gradient(to top, var(--gold), rgba(201,168,76,.3)); min-height: 4px; transition: height .3s; }
    .funil-count { font-size: 16px; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
    .funil-name { font-size: 10px; color: var(--muted); }
    .funil-arrow { color: var(--border); font-size: 16px; padding-bottom: 34px; flex-shrink: 0; }

    /* Filtros */
    .filtros { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .filtros input, .filtros select { background: var(--surface); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 13px; padding: 8px 12px; outline: none; transition: .2s; }
    .filtros input:focus, .filtros select:focus { border-color: var(--gold); }
    .filtros input { min-width: 220px; }
    .filtros select { cursor: pointer; }

    /* Tabela */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .table-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); }
    .table-header-title { font-size: 13px; font-weight: 600; }
    .total-badge { background: rgba(201,168,76,.1); color: var(--gold); border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 16px; font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }
    .badge-status { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .s-novo       { background: rgba(136,136,136,.15); color: #aaa; }
    .s-atendimento{ background: rgba(201,168,76,.15); color: var(--gold); }
    .s-qualificado{ background: rgba(82,192,122,.15); color: var(--success); }
    .s-agendado   { background: rgba(82,192,122,.3); color: var(--success); }
    .s-proposta   { background: rgba(52,130,246,.15); color: #5ba4f5; }
    .s-fechado    { background: rgba(82,192,122,.5); color: #1a1a1a; font-weight: 800; }
    .s-perdido    { background: rgba(224,82,82,.15); color: var(--danger); }
    .badge-qual { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
    .qual-sim { background: rgba(82,192,122,.15); color: var(--success); }
    .qual-nao { background: rgba(136,136,136,.1); color: var(--muted); }
    .tempo-alerta { color: var(--warning); font-weight: 600; }
    .tempo-critico { color: var(--danger); font-weight: 600; }
    .acoes { display: flex; gap: 6px; }
    .btn-icon { width: 30px; height: 30px; border-radius: 6px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: .15s; background: transparent; text-decoration: none; }
    .btn-icon:hover { background: rgba(255,255,255,.08); }
    select.status-select { background: transparent; border: none; color: inherit; font-size: 11px; font-weight: 600; cursor: pointer; outline: none; padding: 0; }
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .loading { text-align: center; padding: 40px; color: var(--muted); }

    /* Notificação */
    .notif { position: fixed; top: 70px; right: 20px; z-index: 9999; background: var(--surface); border: 1px solid var(--gold); border-radius: 10px; padding: 14px 18px; max-width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,.4); animation: slideIn .3s ease; }
    .notif-title { font-weight: 700; color: var(--gold); margin-bottom: 4px; font-size: 13px; }
    .notif-body { font-size: 12px; color: var(--muted); }
    @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 720px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; }
    .modal-head { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-head h2 { font-size: 16px; font-weight: 700; }
    .modal-body { flex: 1; overflow-y: auto; padding: 24px; }
    .modal-foot { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .info-item label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .info-item p { font-size: 14px; margin-top: 2px; }
    .chat-wrap { background: #1a1a1a; border-radius: 10px; padding: 16px; max-height: 320px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .chat-msg { max-width: 75%; }
    .chat-msg.agent { align-self: flex-start; }
    .chat-msg.user { align-self: flex-end; }
    .chat-bubble { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
    .chat-msg.agent .chat-bubble { background: var(--surface2); border-bottom-left-radius: 4px; }
    .chat-msg.user .chat-bubble { background: rgba(201,168,76,.15); border: 1px solid rgba(201,168,76,.2); border-bottom-right-radius: 4px; }
    .chat-time { font-size: 10px; color: var(--muted); margin-top: 4px; padding: 0 4px; }
    .chat-msg.user .chat-time { text-align: right; }

    @media (max-width: 768px) {
      .metrics { grid-template-columns: repeat(2, 1fr); }
      .filtros { flex-direction: column; align-items: stretch; }
      table { display: block; overflow-x: auto; }
      .info-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header class="header">
  <div><div class="logo">Realizzare</div><div class="logo-sub">Planejados</div></div>
  <div class="hdiv"></div>
  <div class="badge-agente">Agente IA</div>
  <div class="hspace"></div>
  <div class="toggle-wrap">
    <span id="toggle-label">Agente ativo</span>
    <label class="toggle">
      <input type="checkbox" id="toggle-agente" checked />
      <span class="toggle-slider"></span>
    </label>
  </div>
  <button class="btn btn-outline" onclick="exportarCSV()">⬇ Exportar CSV</button>
  <button class="btn btn-outline" onclick="sair()">Sair</button>
</header>

<div class="main">
  <div class="metrics">
    <div class="metric-card"><div class="metric-label">Total de leads</div><div class="metric-value" id="m-total">—</div></div>
    <div class="metric-card"><div class="metric-label">Este mês</div><div class="metric-value gold" id="m-mes">—</div></div>
    <div class="metric-card"><div class="metric-label">Qualificados pelo agente</div><div class="metric-value success" id="m-qual">—</div></div>
    <div class="metric-card"><div class="metric-label">Visitas agendadas</div><div class="metric-value" id="m-agenda">—</div></div>
    <div class="metric-card"><div class="metric-label">Taxa de conversão</div><div class="metric-value gold" id="m-taxa">—</div></div>
    <div class="metric-card"><div class="metric-label">Tempo médio qualificação</div><div class="metric-value" id="m-tempo">—</div><div class="metric-sub">após 1ª mensagem</div></div>
  </div>

  <div class="funil-wrap">
    <div class="funil-title">Funil de leads</div>
    <div class="funil-stages" id="funil"></div>
  </div>

  <div class="filtros">
    <input type="text" id="busca" placeholder="🔍 Buscar por nome, telefone ou e-mail…" oninput="filtrar()" />
    <select id="filtro-status" onchange="filtrar()">
      <option value="">Todos os status</option>
      <option value="novo">Novo</option>
      <option value="atendimento">Em atendimento</option>
      <option value="qualificado">Qualificado</option>
      <option value="agendado">Visita agendada</option>
      <option value="proposta">Proposta enviada</option>
      <option value="fechado">Fechado</option>
      <option value="perdido">Perdido</option>
    </select>
    <select id="filtro-ambiente" onchange="filtrar()">
      <option value="">Todos os ambientes</option>
      <option value="cozinha">Cozinha</option>
      <option value="closet">Closet</option>
      <option value="dormitório">Dormitório</option>
      <option value="sala">Sala</option>
      <option value="banheiro">Banheiro</option>
      <option value="área gourmet">Área Gourmet</option>
      <option value="projeto completo">Projeto Completo</option>
    </select>
    <select id="filtro-data" onchange="filtrar()">
      <option value="">Qualquer data</option>
      <option value="hoje">Hoje</option>
      <option value="semana">Esta semana</option>
      <option value="mes">Este mês</option>
    </select>
    <label style="display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;cursor:pointer;">
      <input type="checkbox" id="filtro-qual" onchange="filtrar()" /> Só qualificados pelo agente
    </label>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <span class="table-header-title">Leads</span>
      <span class="total-badge" id="total-badge">0 leads</span>
    </div>
    <div id="tabela-container"><div class="loading">Carregando…</div></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="fecharModalFora(event)">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modal-nome">Detalhes do Lead</h2>
      <button class="btn btn-outline" onclick="fecharModal()">✕ Fechar</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<div id="notif-wrap"></div>

<script>
  const SUPABASE_URL = 'https://xdecwdegfeczmyojrvrt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkZWN3ZGVnZmVjem15b2pydnJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MjM1OTUsImV4cCI6MjA5MjE5OTU5NX0.mL2rhQnqYkFnzU_KUuFrpC30pkGBIedKYNRq-4eTI-0';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let todosLeads = [];
  let leadAtual = null;
  let sessao = null;

  const ETAPAS = [
    { key: 'novo', label: 'Novo' },
    { key: 'atendimento', label: 'Em atendimento' },
    { key: 'qualificado', label: 'Qualificado' },
    { key: 'agendado', label: 'Visita agendada' },
    { key: 'proposta', label: 'Proposta' },
    { key: 'fechado', label: 'Fechado' },
    { key: 'perdido', label: 'Perdido' },
  ];

  async function initAuth() {
    const { data } = await sb.auth.getSession();
    if (!data.session) { window.location.href = 'agente-login.html'; return false; }
    sessao = data.session;
    return true;
  }

  function sair() { sb.auth.signOut().then(() => window.location.href = 'agente-login.html'); }

  async function carregarLeads() {
    const { data } = await sb.from('leads').select('*').order('created_at', { ascending: false });
    todosLeads = data || [];
    renderMetricas(); renderFunil(); filtrar();
  }

  async function carregarConversas(leadId) {
    const { data } = await sb.from('conversas').select('*').eq('lead_id', leadId).order('created_at', { ascending: true });
    return data || [];
  }

  async function atualizarStatus(leadId, novoStatus) {
    await sb.from('leads').update({ status: novoStatus }).eq('id', leadId);
    const l = todosLeads.find(x => x.id === leadId);
    if (l) l.status = novoStatus;
    renderMetricas(); renderFunil(); filtrar();
  }

  function renderMetricas() {
    const agora = new Date();
    const inicioMes = new Date(agora.getFullYear(), agora.getMonth(), 1);
    const total = todosLeads.length;
    const domes = todosLeads.filter(l => new Date(l.created_at) >= inicioMes).length;
    const qual = todosLeads.filter(l => l.qualificado).length;
    const agenda = todosLeads.filter(l => l.status === 'agendado').length;
    const taxa = total > 0 ? Math.round((qual / total) * 100) : 0;
    const qualComTempo = todosLeads.filter(l => l.qualificado && l.first_response_at);
    let tempoMedio = '—';
    if (qualComTempo.length > 0) {
      const soma = qualComTempo.reduce((acc, l) => acc + (new Date(l.first_response_at) - new Date(l.created_at)), 0);
      const min = Math.round(soma / qualComTempo.length / 60000);
      tempoMedio = min < 60 ? `${min}min` : `${Math.round(min/60)}h`;
    }
    document.getElementById('m-total').textContent = total;
    document.getElementById('m-mes').textContent = domes;
    document.getElementById('m-qual').textContent = qual;
    document.getElementById('m-agenda').textContent = agenda;
    document.getElementById('m-taxa').textContent = taxa + '%';
    document.getElementById('m-tempo').textContent = tempoMedio;
  }

  function renderFunil() {
    const cont = {};
    ETAPAS.forEach(e => { cont[e.key] = 0; });
    todosLeads.forEach(l => { if (cont[l.status] !== undefined) cont[l.status]++; });
    const max = Math.max(...Object.values(cont), 1);
    document.getElementById('funil').innerHTML = ETAPAS.map((e, i) => {
      const n = cont[e.key];
      const h = Math.max(4, Math.round((n / max) * 56));
      const arrow = i < ETAPAS.length - 1 ? '<div class="funil-arrow">›</div>' : '';
      return `<div class="funil-stage"><div class="funil-bar-wrap"><div class="funil-bar" style="height:${h}px"></div></div><div class="funil-count">${n}</div><div class="funil-name">${e.label}</div></div>${arrow}`;
    }).join('');
  }

  function filtrar() {
    const busca = document.getElementById('busca').value.toLowerCase();
    const status = document.getElementById('filtro-status').value;
    const ambiente = document.getElementById('filtro-ambiente').value;
    const data = document.getElementById('filtro-data').value;
    const soQual = document.getElementById('filtro-qual').checked;
    const agora = new Date();
    const hoje = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate());
    const semana = new Date(hoje); semana.setDate(hoje.getDate() - 7);
    const mes = new Date(agora.getFullYear(), agora.getMonth(), 1);
    const f = todosLeads.filter(l => {
      if (busca && !`${l.nome} ${l.telefone} ${l.email||''}`.toLowerCase().includes(busca)) return false;
      if (status && l.status !== status) return false;
      if (ambiente && (l.ambiente||'').toLowerCase() !== ambiente) return false;
      if (soQual && !l.qualificado) return false;
      if (data === 'hoje' && new Date(l.created_at) < hoje) return false;
      if (data === 'semana' && new Date(l.created_at) < semana) return false;
      if (data === 'mes' && new Date(l.created_at) < mes) return false;
      return true;
    });
    document.getElementById('total-badge').textContent = `${f.length} lead${f.length !== 1 ? 's' : ''}`;
    renderTabela(f);
  }

  function classeStatus(s) {
    return ({ novo:'s-novo', atendimento:'s-atendimento', qualificado:'s-qualificado', agendado:'s-agendado', proposta:'s-proposta', fechado:'s-fechado', perdido:'s-perdido' })[s] || 's-novo';
  }

  function tempoDecorrido(d) {
    if (!d) return { texto: '—', classe: '' };
    const min = Math.floor((Date.now() - new Date(d)) / 60000);
    const h = Math.floor(min / 60); const dd = Math.floor(h / 24);
    const texto = dd > 0 ? `${dd}d` : h > 0 ? `${h}h` : `${min}min`;
    const classe = h >= 24 ? 'tempo-critico' : h >= 2 ? 'tempo-alerta' : '';
    return { texto, classe };
  }

  function fmtData(d) {
    if (!d) return '—';
    return new Date(d).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
  }

  function renderTabela(leads) {
    const el = document.getElementById('tabela-container');
    if (!leads.length) { el.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>Nenhum lead encontrado</p></div>`; return; }
    const rows = leads.map(l => {
      const { texto: tempo, classe: ct } = tempoDecorrido(l.created_at);
      const wa = `55${l.telefone.replace(/\D/g,'')}`;
      return `<tr>
        <td style="color:var(--muted);font-size:12px">${fmtData(l.created_at)}</td>
        <td><strong>${l.nome}</strong></td>
        <td>${l.telefone}</td>
        <td>${l.ambiente||'<span style="color:var(--muted)">—</span>'}</td>
        <td><select class="status-select badge-status ${classeStatus(l.status)}" onchange="atualizarStatus('${l.id}',this.value)">
          ${ETAPAS.map(e=>`<option value="${e.key}"${l.status===e.key?' selected':''}>${e.label}</option>`).join('')}
        </select></td>
        <td>${l.qualificado ? '<span class="badge-qual qual-sim">✓ Sim</span>' : '<span class="badge-qual qual-nao">— Não</span>'}</td>
        <td><span class="${ct}">${tempo}</span></td>
        <td><div class="acoes">
          <button class="btn-icon" title="Ver conversa" onclick="abrirModal('${l.id}')">💬</button>
          <a class="btn-icon" title="WhatsApp" href="https://wa.me/${wa}" target="_blank">📱</a>
          <a class="btn-icon" title="Ligar" href="tel:${l.telefone}">📞</a>
          ${l.email?`<a class="btn-icon" title="E-mail" href="mailto:${l.email}">✉️</a>`:''}
        </div></td>
      </tr>`;
    }).join('');
    el.innerHTML = `<table><thead><tr><th>Data/hora</th><th>Nome</th><th>Telefone</th><th>Ambiente</th><th>Status</th><th>Qualificado IA</th><th>Há quanto tempo</th><th>Ações</th></tr></thead><tbody>${rows}</tbody></table>`;
  }

  async function abrirModal(leadId) {
    leadAtual = todosLeads.find(l => l.id === leadId);
    if (!leadAtual) return;
    document.getElementById('modal-nome').textContent = leadAtual.nome;
    document.getElementById('modal-body').innerHTML = '<div class="loading">Carregando conversa…</div>';
    document.getElementById('modal-overlay').classList.add('open');
    const conversas = await carregarConversas(leadId);
    document.getElementById('modal-body').innerHTML = `
      <div class="info-grid">
        <div class="info-item"><label>Nome</label><p>${leadAtual.nome}</p></div>
        <div class="info-item"><label>Telefone</label><p>${leadAtual.telefone}</p></div>
        <div class="info-item"><label>E-mail</label><p>${leadAtual.email||'—'}</p></div>
        <div class="info-item"><label>Ambiente</label><p>${leadAtual.ambiente||'—'}</p></div>
        <div class="info-item"><label>Tipo de projeto</label><p>${leadAtual.tipo_projeto||'—'}</p></div>
        <div class="info-item"><label>Orçamento</label><p>${leadAtual.orcamento_faixa||'—'}</p></div>
        <div class="info-item"><label>Prazo</label><p>${leadAtual.prazo_desejado||'—'}</p></div>
        <div class="info-item"><label>Qualificado</label><p>${leadAtual.qualificado?'✅ Sim':'❌ Ainda não'}</p></div>
        ${leadAtual.mensagem?`<div class="info-item" style="grid-column:1/-1"><label>Mensagem inicial</label><p style="color:var(--muted)">${leadAtual.mensagem}</p></div>`:''}
      </div>
      <div style="font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Conversa com o agente (${conversas.length} mensagens)</div>
      <div class="chat-wrap">${conversas.length===0
        ? '<p style="color:var(--muted);text-align:center;font-size:13px">Nenhuma mensagem ainda</p>'
        : conversas.map(c=>`<div class="chat-msg ${c.role}"><div class="chat-bubble">${c.mensagem.replace(/\n/g,'<br>')}</div><div class="chat-time">${fmtData(c.created_at)}</div></div>`).join('')
      }</div>`;
    setTimeout(() => { const c = document.querySelector('.chat-wrap'); if (c) c.scrollTop = c.scrollHeight; }, 50);
    const ativo = leadAtual.agente_ativo;
    document.getElementById('modal-foot').innerHTML = `
      <button class="btn ${ativo?'btn-danger':'btn-success'}" onclick="toggleAgente('${leadId}',${!ativo})">
        ${ativo?'⏸ Pausar agente':'▶ Reativar agente'}
      </button>
      <a class="btn btn-gold" href="https://wa.me/55${leadAtual.telefone.replace(/\D/g,'')}" target="_blank">📱 Abrir WhatsApp</a>`;
  }

  async function toggleAgente(leadId, novoValor) {
    await sb.from('leads').update({
      agente_ativo: novoValor,
      assumido_por: novoValor ? null : (sessao?.user?.email || 'consultor'),
      assumido_em: novoValor ? null : new Date().toISOString(),
    }).eq('id', leadId);
    const l = todosLeads.find(x => x.id === leadId);
    if (l) l.agente_ativo = novoValor;
    fecharModal();
    notificar(novoValor ? 'Agente reativado' : 'Agente pausado', novoValor ? 'O agente voltará a responder.' : 'Você assumiu o atendimento.');
  }

  function fecharModal() { document.getElementById('modal-overlay').classList.remove('open'); leadAtual = null; }
  function fecharModalFora(e) { if (e.target === document.getElementById('modal-overlay')) fecharModal(); }

  let notifTimer;
  function notificar(titulo, corpo) {
    clearTimeout(notifTimer);
    document.getElementById('notif-wrap').innerHTML = `<div class="notif"><div class="notif-title">${titulo}</div><div class="notif-body">${corpo}</div></div>`;
    notifTimer = setTimeout(() => { document.getElementById('notif-wrap').innerHTML = ''; }, 4000);
  }

  function tocarSom() {
    try { const ctx = new AudioContext(); const o = ctx.createOscillator(); const g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value = 880; g.gain.setValueAtTime(0.3, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4); o.start(); o.stop(ctx.currentTime + 0.4); } catch(_) {}
  }

  function iniciarRealtime() {
    sb.channel('leads-rt')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'leads' }, (p) => {
        todosLeads.unshift(p.new); renderMetricas(); renderFunil(); filtrar();
        tocarSom(); notificar('🔔 Novo lead!', `${p.new.nome} — ${p.new.telefone}`);
      })
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'leads' }, (p) => {
        const i = todosLeads.findIndex(l => l.id === p.new.id);
        if (i !== -1) todosLeads[i] = p.new; else todosLeads.unshift(p.new);
        renderMetricas(); renderFunil(); filtrar();
      })
      .subscribe();
    sb.channel('conversas-rt')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'conversas' }, (p) => {
        if (leadAtual && p.new.lead_id === leadAtual.id) abrirModal(leadAtual.id);
      })
      .subscribe();
  }

  document.getElementById('toggle-agente').addEventListener('change', (e) => {
    document.getElementById('toggle-label').textContent = e.target.checked ? 'Agente ativo' : 'Agente pausado';
    notificar(e.target.checked ? '▶ Agente ativado' : '⏸ Agente pausado', e.target.checked ? 'O agente responderá novos leads.' : 'Nenhum lead receberá resposta automática.');
  });

  function exportarCSV() {
    const cols = ['nome','telefone','email','ambiente','tipo_projeto','orcamento_faixa','prazo_desejado','status','qualificado','created_at'];
    const blob = new Blob([cols.join(';')+'\n'+todosLeads.map(l=>cols.map(c=>`"${(l[c]??'').toString().replace(/"/g,'""')}"`).join(';')).join('\n')], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `leads-realizzare-${new Date().toISOString().slice(0,10)}.csv`; a.click();
  }

  (async () => {
    if (!await initAuth()) return;
    await carregarLeads();
    iniciarRealtime();
  })();
</script>
</body>
</html>
