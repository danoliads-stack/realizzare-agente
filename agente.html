<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRM — Realizzare Planejados</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;
  --s1:#101010;
  --s2:#181818;
  --s3:#202020;
  --s4:#282828;
  --border:#222;
  --border2:#2e2e2e;
  --gold:#c9a84c;
  --gold2:#e8c46a;
  --gold-dim:rgba(201,168,76,.08);
  --gold-dim2:rgba(201,168,76,.15);
  --cream:#f0ebe0;
  --text:#d8d3c8;
  --muted:#5a5550;
  --muted2:#3a3530;
  --green:#4caf80;
  --green-dim:rgba(76,175,128,.1);
  --red:#c05050;
  --red-dim:rgba(192,80,80,.1);
  --amber:#c08840;
  --amber-dim:rgba(192,136,64,.1);
  --blue:#5080c0;
  --font-display:'Cormorant',serif;
  --font-ui:'Outfit',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:13px;line-height:1.5;overflow:hidden}

/* ── Sidebar ─────────────────────────────────────────────── */
.layout{display:flex;height:100vh}
.sidebar{
  width:200px;flex-shrink:0;
  background:var(--s1);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:relative;
}
.sidebar::after{
  content:'';position:absolute;top:0;right:0;width:1px;height:100%;
  background:linear-gradient(to bottom,transparent,var(--gold),transparent);
  opacity:.15;
}
.brand{padding:28px 22px 20px;border-bottom:1px solid var(--border)}
.brand-name{
  font-family:var(--font-display);font-size:20px;font-weight:600;
  letter-spacing:.05em;color:var(--gold);font-style:italic;line-height:1;
}
.brand-sub{
  font-family:var(--font-ui);font-size:9px;letter-spacing:.25em;
  text-transform:uppercase;color:var(--muted);margin-top:5px;
}
.brand-tag{
  display:inline-flex;align-items:center;gap:5px;margin-top:10px;
  font-size:9px;letter-spacing:.15em;text-transform:uppercase;
  color:var(--muted);border:1px solid var(--border2);
  border-radius:2px;padding:3px 8px;
}
.brand-tag-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green)}

nav{flex:1;padding:16px 12px}
.nav-section{
  font-size:8px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--muted2);padding:0 10px;margin-bottom:6px;margin-top:16px;
}
.nav-section:first-child{margin-top:0}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:3px;cursor:pointer;
  color:var(--muted);font-size:12px;font-weight:400;
  transition:color .15s,background .15s;
  position:relative;user-select:none;letter-spacing:.01em;
}
.nav-item:hover{color:var(--text);background:var(--s2)}
.nav-item.active{
  color:var(--gold);background:var(--gold-dim);
}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:25%;bottom:25%;
  width:2px;background:var(--gold);border-radius:0 1px 1px 0;
}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{
  margin-left:auto;background:var(--gold);color:#080808;
  font-family:var(--font-mono);font-size:9px;font-weight:600;
  padding:1px 5px;border-radius:2px;min-width:16px;text-align:center;
  display:none;
}

.sidebar-foot{padding:14px 12px;border-top:1px solid var(--border)}
.user-block{display:flex;align-items:center;gap:8px;padding:6px 8px}
.user-av{
  width:26px;height:26px;border-radius:2px;
  background:var(--gold-dim);border:1px solid rgba(201,168,76,.2);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:13px;color:var(--gold);font-style:italic;
}
.user-email{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.btn-sair{
  width:100%;margin-top:8px;
  background:transparent;border:1px solid var(--border2);
  border-radius:2px;color:var(--muted);font-size:11px;
  font-family:var(--font-ui);padding:6px;cursor:pointer;
  letter-spacing:.05em;transition:.15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-sair:hover{border-color:var(--red);color:var(--red)}

/* ── Main ────────────────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{
  background:var(--s1);border-bottom:1px solid var(--border);
  padding:0 28px;height:48px;display:flex;align-items:center;gap:16px;flex-shrink:0;
}
.topbar-title{
  font-family:var(--font-display);font-size:18px;font-style:italic;
  color:var(--cream);letter-spacing:.02em;flex:1;
}
.topbar-clock{
  font-family:var(--font-mono);font-size:11px;color:var(--muted);
  letter-spacing:.05em;
}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:2px;border:none;
  cursor:pointer;font-size:11px;font-weight:500;
  font-family:var(--font-ui);letter-spacing:.05em;transition:.15s;
}
.btn-gold{background:var(--gold);color:#080808}
.btn-gold:hover{background:var(--gold2)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--muted)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-green{background:var(--green-dim);border:1px solid rgba(76,175,128,.25);color:var(--green)}
.btn-green:hover{background:rgba(76,175,128,.18)}
.btn-red{background:var(--red-dim);border:1px solid rgba(192,80,80,.25);color:var(--red)}
.btn-red:hover{background:rgba(192,80,80,.18)}
.btn-sm{padding:5px 10px;font-size:10px}
.btn:disabled{opacity:.35;cursor:not-allowed}

.content{flex:1;overflow-y:auto;padding:28px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── KPI ─────────────────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:24px}
.kpi{
  background:var(--s1);border:1px solid var(--border);
  border-radius:3px;padding:16px 18px;position:relative;overflow:hidden;
}
.kpi::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  opacity:0;transition:.3s;
}
.kpi:hover::before{opacity:.4}
.kpi-label{
  font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;
}
.kpi-val{
  font-family:var(--font-mono);font-size:24px;font-weight:600;
  line-height:1;color:var(--cream);
}
.kpi-val.gold{color:var(--gold)}
.kpi-val.green{color:var(--green)}
.kpi-val.amber{color:var(--amber)}
.kpi-sub{font-size:9px;color:var(--muted);margin-top:5px;letter-spacing:.05em}

/* ── Seção ───────────────────────────────────────────────── */
.section{background:var(--s1);border:1px solid var(--border);border-radius:3px;margin-bottom:20px;overflow:hidden}
.section-head{
  padding:12px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.section-label{
  font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
}
.section-body{padding:16px 18px}

/* ── Funil ───────────────────────────────────────────────── */
.funil{display:flex;align-items:flex-end;gap:3px}
.funil-col{flex:1;text-align:center}
.funil-bar-wrap{height:52px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:5px}
.funil-bar{
  width:100%;border-radius:1px 1px 0 0;min-height:2px;
  background:linear-gradient(to top,var(--gold),rgba(201,168,76,.2));
}
.funil-n{font-family:var(--font-mono);font-size:14px;font-weight:600;color:var(--gold)}
.funil-lbl{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:3px}
.funil-sep{color:var(--border2);font-size:12px;padding-bottom:28px;flex-shrink:0}

/* ── Feed ────────────────────────────────────────────────── */
.feed{display:flex;flex-direction:column}
.feed-item{
  display:flex;align-items:baseline;gap:10px;
  padding:7px 0;border-bottom:1px solid rgba(255,255,255,.03);
  cursor:pointer;transition:.1s;
}
.feed-item:hover{padding-left:4px}
.feed-item:last-child{border-bottom:none}
.feed-line{width:1px;height:12px;background:var(--border2);flex-shrink:0;margin-top:2px}
.feed-text{flex:1;font-size:12px;color:var(--text);line-height:1.4}
.feed-text b{color:var(--cream);font-weight:500}
.feed-time{font-family:var(--font-mono);font-size:10px;color:var(--muted);white-space:nowrap}

/* ── Alertas ─────────────────────────────────────────────── */
.alerta{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:2px;margin-bottom:6px;
  cursor:pointer;transition:filter .15s;
}
.alerta:hover{filter:brightness(1.15)}
.alerta.crit{background:var(--red-dim);border-left:2px solid var(--red)}
.alerta.warn{background:var(--amber-dim);border-left:2px solid var(--amber)}
.alerta-nome{font-size:12px;font-weight:500;color:var(--cream)}
.alerta-det{font-size:10px;color:var(--muted);margin-top:1px}
.alerta-badge{
  margin-left:auto;font-family:var(--font-mono);font-size:10px;font-weight:600;
  white-space:nowrap;padding:2px 7px;border-radius:2px;
}
.alerta.crit .alerta-badge{background:var(--red-dim);color:var(--red)}
.alerta.warn .alerta-badge{background:var(--amber-dim);color:var(--amber)}

/* ── Kanban ──────────────────────────────────────────────── */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;min-height:520px;align-items:flex-start}
.k-col{
  background:var(--s1);border:1px solid var(--border);border-radius:3px;
  width:230px;flex-shrink:0;display:flex;flex-direction:column;
  max-height:calc(100vh - 140px);
}
.k-col-head{
  padding:10px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.k-col-pip{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.k-col-name{
  font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  font-weight:600;flex:1;color:var(--text);
}
.k-col-n{
  font-family:var(--font-mono);font-size:10px;
  color:var(--muted);background:var(--s3);
  padding:1px 6px;border-radius:2px;
}
.k-cards{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
.k-card{
  background:var(--s2);border:1px solid var(--border);border-radius:2px;
  padding:12px;cursor:pointer;transition:border-color .15s,transform .15s;
}
.k-card:hover{border-color:var(--gold);transform:translateY(-1px)}
.k-card-name{font-size:13px;font-weight:500;color:var(--cream);margin-bottom:3px}
.k-card-phone{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:8px}
.k-card-amb{
  display:inline-block;font-size:9px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--gold);border:1px solid rgba(201,168,76,.2);
  padding:1px 6px;border-radius:1px;margin-bottom:8px;
}
.k-card-foot{display:flex;align-items:center;justify-content:space-between}
.k-card-age{font-family:var(--font-mono);font-size:9px;color:var(--muted)}
.k-card-age.warn{color:var(--amber)}
.k-card-age.crit{color:var(--red)}
.k-tag{
  font-size:8px;letter-spacing:.1em;text-transform:uppercase;
  padding:1px 5px;border-radius:1px;font-weight:600;
}
.k-tag.agente{background:var(--green-dim);color:var(--green)}
.k-tag.consultor{background:var(--amber-dim);color:var(--amber)}
.k-empty{text-align:center;padding:24px 8px;color:var(--muted2);font-size:11px}

/* ── Ao vivo ─────────────────────────────────────────────── */
.ao-vivo-list{display:flex;flex-direction:column;gap:6px}
.conv{
  background:var(--s1);border:1px solid var(--border);border-radius:3px;
  padding:14px 16px;cursor:pointer;transition:border-color .15s;
  display:flex;gap:14px;align-items:flex-start;
}
.conv:hover{border-color:rgba(201,168,76,.3)}
.conv.nova{
  border-color:var(--green);
  box-shadow:0 0 0 1px rgba(76,175,128,.1);
}
.conv-av{
  width:36px;height:36px;border-radius:2px;flex-shrink:0;
  background:var(--s3);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:16px;font-style:italic;
  color:var(--gold);text-transform:uppercase;
}
.conv-body{flex:1;min-width:0}
.conv-r1{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.conv-name{font-size:13px;font-weight:500;color:var(--cream)}
.conv-preview{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.conv-meta{display:flex;align-items:center;gap:10px}
.conv-age{font-family:var(--font-mono);font-size:10px;color:var(--muted)}
.conv-age.warn{color:var(--amber)}
.conv-age.crit{color:var(--red)}
.conv-qual{font-size:9px;font-weight:600;letter-spacing:.05em;color:var(--green)}
.conv-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;box-shadow:0 0 4px currentColor}
.conv-dot.green{color:var(--green);background:var(--green)}
.conv-dot.amber{color:var(--amber);background:var(--amber)}
.new-pip{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:5px;box-shadow:0 0 6px var(--green);animation:glow 1.2s infinite alternate}
@keyframes glow{from{opacity:.6}to{opacity:1}}

/* ── Badges de status ────────────────────────────────────── */
.badge{
  display:inline-block;font-size:8px;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;
  padding:2px 7px;border-radius:1px;
}
.b-novo{background:rgba(90,90,80,.2);color:#888}
.b-atendimento{background:var(--gold-dim2);color:var(--gold)}
.b-qualificado{background:var(--green-dim);color:var(--green)}
.b-agendado{background:rgba(76,175,128,.2);color:var(--green)}
.b-proposta{background:rgba(80,128,192,.12);color:var(--blue)}
.b-fechado{background:rgba(76,175,128,.35);color:#f0ebe0;font-weight:800}
.b-perdido{background:var(--red-dim);color:var(--red)}

/* ── Painel lead ─────────────────────────────────────────── */
.lead-overlay{position:fixed;inset:0;z-index:300;display:none}
.lead-overlay.open{display:flex;justify-content:flex-end}
.lead-back{flex:1;background:rgba(0,0,0,.6);backdrop-filter:blur(3px)}
.lead-panel{
  width:500px;background:var(--s1);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh;overflow:hidden;
  animation:slidePanel .2s ease;
}
@keyframes slidePanel{from{transform:translateX(20px);opacity:.5}to{transform:translateX(0);opacity:1}}
.lp-head{
  padding:18px 22px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:12px;flex-shrink:0;
}
.lp-name{
  font-family:var(--font-display);font-size:22px;font-style:italic;
  color:var(--cream);line-height:1;flex:1;
}
.lp-badges{margin-top:5px;display:flex;gap:5px;flex-wrap:wrap}
.lp-tabs{
  display:flex;border-bottom:1px solid var(--border);flex-shrink:0;
  padding:0 22px;
}
.lp-tab{
  padding:10px 14px;font-size:10px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);cursor:pointer;
  border-bottom:1px solid transparent;margin-bottom:-1px;transition:.15s;
}
.lp-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.lp-body{flex:1;overflow-y:auto;display:none;flex-direction:column}
.lp-body.active{display:flex}

/* Info */
.lp-info{padding:20px 22px}
.info-ruler{height:1px;background:var(--border);margin:16px 0}
.info-cat{
  font-size:8px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;
}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ii label{
  font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);display:block;margin-bottom:3px;
}
.ii p{font-size:13px;color:var(--cream)}
.ii.full{grid-column:1/-1}
.ii a{color:var(--gold);text-decoration:none}
.ii a:hover{text-decoration:underline}
.status-sel{
  width:100%;background:var(--s2);border:1px solid var(--border2);
  border-radius:2px;color:var(--text);font-size:12px;
  font-family:var(--font-ui);padding:6px 10px;outline:none;cursor:pointer;
  transition:.15s;
}
.status-sel:focus{border-color:var(--gold)}
textarea.notas{
  width:100%;background:var(--s2);border:1px solid var(--border2);
  border-radius:2px;color:var(--text);font-size:12px;
  font-family:var(--font-ui);padding:8px 10px;outline:none;
  resize:none;min-height:72px;line-height:1.5;transition:.15s;
  margin-top:6px;
}
textarea.notas:focus{border-color:var(--gold)}
.acoes-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}

/* Chat */
.chat-msgs{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:7px;background:var(--bg)}
.cm{max-width:76%}
.cm.agent{align-self:flex-start}
.cm.user{align-self:flex-end}
.cm-bub{
  padding:9px 13px;font-size:12px;line-height:1.55;
  border-radius:2px;word-break:break-word;
}
.cm.agent .cm-bub{background:var(--s2);border:1px solid var(--border)}
.cm.user .cm-bub{
  background:rgba(201,168,76,.1);
  border:1px solid rgba(201,168,76,.15);
}
.cm-time{
  font-family:var(--font-mono);font-size:9px;
  color:var(--muted);margin-top:3px;padding:0 2px;
}
.cm.user .cm-time{text-align:right}
.chat-foot{padding:14px 16px;border-top:1px solid var(--border);background:var(--s1);flex-shrink:0}
.chat-assumir{text-align:center;padding:14px}
.chat-assumir p{font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5}
.chat-ctrl{margin-bottom:8px}
.ctrl-label{
  font-size:9px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--amber);margin-bottom:7px;
  display:flex;align-items:center;gap:5px;
}
.ctrl-label::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--amber)}
.chat-row{display:flex;gap:7px}
.chat-inp{
  flex:1;background:var(--s2);border:1px solid var(--border2);
  border-radius:2px;color:var(--text);font-size:12px;
  font-family:var(--font-ui);padding:8px 12px;outline:none;
  resize:none;max-height:90px;line-height:1.5;transition:.15s;
}
.chat-inp:focus{border-color:var(--gold)}
.chat-send{
  background:var(--gold);color:#080808;border:none;border-radius:2px;
  padding:8px 13px;cursor:pointer;transition:.15s;
  display:flex;align-items:center;justify-content:center;
}
.chat-send:hover{background:var(--gold2)}
.chat-send:disabled{opacity:.35;cursor:not-allowed}
.chat-empty{text-align:center;padding:36px;color:var(--muted);font-size:12px}

/* ── Notif ───────────────────────────────────────────────── */
.notif-wrap{position:fixed;top:14px;right:14px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.notif{
  background:var(--s2);border:1px solid var(--border);
  border-left:2px solid var(--gold);border-radius:2px;
  padding:10px 14px;width:260px;
  box-shadow:0 4px 24px rgba(0,0,0,.6);
  animation:notifIn .2s ease;
}
.notif.green{border-left-color:var(--green)}
.notif.red{border-left-color:var(--red)}
.notif-t{font-size:11px;font-weight:600;color:var(--cream);margin-bottom:2px}
.notif-b{font-size:10px;color:var(--muted)}
@keyframes notifIn{from{transform:translateX(12px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── Misc ────────────────────────────────────────────────── */
.loading{text-align:center;padding:60px;color:var(--muted);font-size:12px;letter-spacing:.05em}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-top:8px}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="layout">

<!-- Sidebar -->
<aside class="sidebar">
  <div class="brand">
    <div class="brand-name">Realizzare</div>
    <div class="brand-sub">Planejados · CRM</div>
    <div class="brand-tag"><span class="brand-tag-dot"></span>Agente IA</div>
  </div>
  <nav>
    <div class="nav-section">Painel</div>
    <div class="nav-item active" data-view="dashboard" onclick="trocarView('dashboard')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
        <rect x="1" y="1" width="6" height="6" rx=".5"/><rect x="9" y="1" width="6" height="6" rx=".5"/>
        <rect x="1" y="9" width="6" height="6" rx=".5"/><rect x="9" y="9" width="6" height="6" rx=".5"/>
      </svg>
      Dashboard
    </div>
    <div class="nav-item" data-view="kanban" onclick="trocarView('kanban')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
        <rect x="1" y="2" width="4" height="12" rx=".5"/>
        <rect x="6" y="2" width="4" height="8" rx=".5"/>
        <rect x="11" y="2" width="4" height="10" rx=".5"/>
      </svg>
      Kanban
    </div>
    <div class="nav-item" data-view="ao-vivo" onclick="trocarView('ao-vivo')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
        <circle cx="8" cy="8" r="2.5"/>
        <path d="M4 4a5.66 5.66 0 0 0 0 8M12 4a5.66 5.66 0 0 1 0 8"/>
        <path d="M1.5 1.5a10.1 10.1 0 0 0 0 13M14.5 1.5a10.1 10.1 0 0 1 0 13"/>
      </svg>
      Ao vivo
      <span class="nav-badge" id="badge-vivo">0</span>
    </div>
  </nav>
  <div class="sidebar-foot">
    <div class="user-block">
      <div class="user-av" id="user-av">?</div>
      <div class="user-email" id="user-email">—</div>
    </div>
    <button class="btn-sair" onclick="sair()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M10 11l4-3-4-3M14 8H6"/>
      </svg>
      Sair
    </button>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">Dashboard</div>
    <div class="topbar-clock" id="clock"></div>
    <button class="btn btn-outline btn-sm" onclick="exportarCSV()">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8 2v9M4 8l4 4 4-4M2 13h12"/>
      </svg>
      Exportar CSV
    </button>
  </div>
  <div class="content" id="content"><div class="loading">Carregando</div></div>
</div>

</div><!-- /layout -->

<!-- Painel Lead -->
<div class="lead-overlay" id="lo">
  <div class="lead-back" onclick="fecharLead()"></div>
  <div class="lead-panel">
    <div class="lp-head">
      <div>
        <div class="lp-name" id="lp-name">—</div>
        <div class="lp-badges" id="lp-badges"></div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="fecharLead()">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 2l12 12M14 2L2 14"/></svg>
        Fechar
      </button>
    </div>
    <div class="lp-tabs">
      <div class="lp-tab active" onclick="trocarTab('info')">Informações</div>
      <div class="lp-tab" onclick="trocarTab('chat')">Conversa</div>
    </div>
    <div class="lp-body active" id="tab-info"><div class="lp-info" id="lp-info"></div></div>
    <div class="lp-body" id="tab-chat" style="flex-direction:column">
      <div class="chat-msgs" id="chat-msgs"></div>
      <div class="chat-foot" id="chat-foot"></div>
    </div>
  </div>
</div>

<div class="notif-wrap" id="notif-wrap"></div>

<script>
const SUPABASE_URL  = 'https://xdecwdegfeczmyojrvrt.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkZWN3ZGVnZmVjem15b2pydnJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MjM1OTUsImV4cCI6MjA5MjE5OTU5NX0.mL2rhQnqYkFnzU_KUuFrpC30pkGBIedKYNRq-4eTI-0';
const WORKER_URL    = 'https://realizzare-agente-worker.danoliads.workers.dev';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let todos = [], leadAtual = null, sessao = null, novas = new Set(), viewAtual = 'dashboard';

const ETAPAS = [
  { key:'novo',        label:'Novo',        pip:'#555' },
  { key:'atendimento', label:'Atendimento',  pip:'#c9a84c' },
  { key:'qualificado', label:'Qualificado',  pip:'#4caf80' },
  { key:'agendado',    label:'Agendado',     pip:'#4caf80' },
  { key:'proposta',    label:'Proposta',     pip:'#5080c0' },
  { key:'fechado',     label:'Fechado',      pip:'#4caf80' },
  { key:'perdido',     label:'Perdido',      pip:'#c05050' },
];

// ─── Auth ─────────────────────────────────────────────────────────────────────
async function initAuth() {
  const { data } = await sb.auth.getSession();
  if (!data.session) { location.href = 'agente-login.html'; return false; }
  sessao = data.session;
  const e = sessao.user.email;
  document.getElementById('user-email').textContent = e;
  document.getElementById('user-av').textContent = e[0].toUpperCase();
  return true;
}
function sair() { sb.auth.signOut().then(() => location.href = 'agente-login.html'); }

// ─── Dados ────────────────────────────────────────────────────────────────────
async function carregarLeads() {
  const { data } = await sb.from('leads').select('*').order('created_at', { ascending: false });
  todos = data || [];
  renderView();
}
async function carregarConversas(id) {
  const { data } = await sb.from('conversas').select('*').eq('lead_id', id).order('created_at', { ascending: true });
  return data || [];
}
async function atualizarStatus(id, s) {
  await sb.from('leads').update({ status: s }).eq('id', id);
  const l = todos.find(x => x.id === id); if (l) l.status = s;
  renderView(); notif('Status atualizado', s, 'green');
}
async function assumir(id) {
  await sb.from('leads').update({ agente_ativo: false, assumido_por: sessao.user.email, assumido_em: new Date().toISOString() }).eq('id', id);
  const l = todos.find(x => x.id === id); if (l) { l.agente_ativo = false; l.assumido_por = sessao.user.email; leadAtual = l; }
  renderChatFoot(); renderInfo(); notif('Atendimento assumido', 'Agente pausado para este lead.', 'default');
}
async function devolver(id) {
  await sb.from('leads').update({ agente_ativo: true, assumido_por: null, assumido_em: null }).eq('id', id);
  const l = todos.find(x => x.id === id); if (l) { l.agente_ativo = true; l.assumido_por = null; leadAtual = l; }
  renderChatFoot(); renderInfo(); notif('Agente reativado', '', 'green');
}
async function salvarNotas(id) {
  const v = document.getElementById('notas-inp').value;
  await sb.from('leads').update({ notas_internas: v }).eq('id', id);
  notif('Notas salvas', '', 'green');
}
async function enviarConsultor(id) {
  const inp = document.getElementById('chat-inp');
  const btn = document.getElementById('chat-send');
  const msg = inp.value.trim(); if (!msg) return;
  inp.value = ''; btn.disabled = true;
  const r = await fetch(`${WORKER_URL}/enviar-mensagem`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ lead_id: id, mensagem: msg }),
  });
  btn.disabled = false;
  if (r.ok) { const c = await carregarConversas(id); renderMsgs(c); }
  else notif('Erro ao enviar', 'Verifique a Evolution API.', 'red');
}

// ─── Views ────────────────────────────────────────────────────────────────────
function trocarView(v) {
  viewAtual = v;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === v));
  const t = { dashboard:'Dashboard', kanban:'Kanban', 'ao-vivo':'Ao vivo' };
  document.getElementById('topbar-title').textContent = t[v] || v;
  document.getElementById('content').innerHTML = '<div class="loading">Carregando</div>';
  setTimeout(renderView, 10);
}
function renderView() {
  if (viewAtual === 'dashboard') renderDash();
  else if (viewAtual === 'kanban') renderKanban();
  else if (viewAtual === 'ao-vivo') renderAoVivo();
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function renderDash() {
  const now = new Date();
  const hoje = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const mes  = new Date(now.getFullYear(), now.getMonth(), 1);
  const total   = todos.length;
  const dohoje  = todos.filter(l => new Date(l.created_at) >= hoje).length;
  const domes   = todos.filter(l => new Date(l.created_at) >= mes).length;
  const qual    = todos.filter(l => l.qualificado).length;
  const agenda  = todos.filter(l => l.status === 'agendado').length;
  const fechados = todos.filter(l => l.status === 'fechado').length;
  const ativos  = todos.filter(l => l.agente_ativo).length;
  const taxa    = total > 0 ? Math.round((qual / total) * 100) : 0;
  const qt = todos.filter(l => l.qualificado && l.first_response_at);
  let tmed = '—';
  if (qt.length) {
    const s = qt.reduce((a,l) => a + (new Date(l.first_response_at) - new Date(l.created_at)), 0);
    const m = Math.round(s / qt.length / 60000);
    tmed = m < 60 ? `${m}min` : `${Math.round(m/60)}h`;
  }
  const criticos = todos.filter(l => l.agente_ativo && diffH(l.created_at) > 24);
  const warns    = todos.filter(l => l.agente_ativo && diffH(l.created_at) > 2 && diffH(l.created_at) <= 24);
  const recentes = [...todos].slice(0, 12);

  document.getElementById('content').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Leads hoje</div><div class="kpi-val gold">${dohoje}</div></div>
      <div class="kpi"><div class="kpi-label">Este mês</div><div class="kpi-val">${domes}</div></div>
      <div class="kpi"><div class="kpi-label">Agente ativo</div><div class="kpi-val green">${ativos}</div><div class="kpi-sub">conversas em curso</div></div>
      <div class="kpi"><div class="kpi-label">Qualificados</div><div class="kpi-val gold">${qual}</div></div>
      <div class="kpi"><div class="kpi-label">Visitas agendadas</div><div class="kpi-val green">${agenda}</div></div>
      <div class="kpi"><div class="kpi-label">Fechados</div><div class="kpi-val green">${fechados}</div></div>
      <div class="kpi"><div class="kpi-label">Taxa de conversão</div><div class="kpi-val gold">${taxa}%</div></div>
      <div class="kpi"><div class="kpi-label">Tempo médio qualif.</div><div class="kpi-val">${tmed}</div></div>
    </div>
    <div class="section" style="margin-bottom:20px">
      <div class="section-head"><span class="section-label">Funil de vendas</span></div>
      <div class="section-body"><div class="funil">${funilHTML()}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="section">
        <div class="section-head">
          <span class="section-label">Alertas — sem resposta</span>
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--red)">${criticos.length + warns.length}</span>
        </div>
        <div class="section-body" style="padding:10px 14px">
          ${criticos.map(l => `
            <div class="alerta crit" onclick="abrirLead('${l.id}')">
              <div><div class="alerta-nome">${l.nome}</div><div class="alerta-det">${l.telefone}${l.ambiente?' · '+l.ambiente:''}</div></div>
              <div class="alerta-badge">${fmtDiff(l.created_at)}</div>
            </div>`).join('')}
          ${warns.map(l => `
            <div class="alerta warn" onclick="abrirLead('${l.id}')">
              <div><div class="alerta-nome">${l.nome}</div><div class="alerta-det">${l.telefone}${l.ambiente?' · '+l.ambiente:''}</div></div>
              <div class="alerta-badge">${fmtDiff(l.created_at)}</div>
            </div>`).join('')}
          ${!criticos.length && !warns.length ? '<div style="font-size:11px;color:var(--muted);text-align:center;padding:12px;letter-spacing:.05em">Nenhum alerta</div>' : ''}
        </div>
      </div>
      <div class="section">
        <div class="section-head"><span class="section-label">Atividade recente</span></div>
        <div class="section-body" style="padding:6px 16px">
          <div class="feed">
            ${recentes.map(l => `
              <div class="feed-item" onclick="abrirLead('${l.id}')">
                <div class="feed-line"></div>
                <div class="feed-text"><b>${l.nome}</b> &mdash; ${l.status}${l.ambiente?' · '+l.ambiente:''}</div>
                <div class="feed-time">${fmtDiff(l.created_at)}</div>
              </div>`).join('')}
            ${!recentes.length ? '<div class="feed-item"><div class="feed-text" style="color:var(--muted)">Nenhum lead registrado</div></div>' : ''}
          </div>
        </div>
      </div>
    </div>`;
}

function funilHTML() {
  const c = {}; ETAPAS.forEach(e => { c[e.key] = 0; });
  todos.forEach(l => { if (c[l.status] !== undefined) c[l.status]++; });
  const max = Math.max(...Object.values(c), 1);
  return ETAPAS.map((e, i) => {
    const n = c[e.key], h = Math.max(2, Math.round((n / max) * 48));
    const sep = i < ETAPAS.length - 1 ? '<div class="funil-sep">›</div>' : '';
    return `<div class="funil-col"><div class="funil-bar-wrap"><div class="funil-bar" style="height:${h}px"></div></div><div class="funil-n">${n}</div><div class="funil-lbl">${e.label}</div></div>${sep}`;
  }).join('');
}

// ─── Kanban ───────────────────────────────────────────────────────────────────
function renderKanban() {
  const g = {}; ETAPAS.forEach(e => { g[e.key] = []; });
  todos.forEach(l => { if (g[l.status]) g[l.status].push(l); });
  document.getElementById('content').innerHTML = `
    <div class="kanban">${ETAPAS.map(e => `
      <div class="k-col">
        <div class="k-col-head">
          <div class="k-col-pip" style="background:${e.pip}"></div>
          <div class="k-col-name">${e.label}</div>
          <div class="k-col-n">${g[e.key].length}</div>
        </div>
        <div class="k-cards">
          ${!g[e.key].length ? '<div class="k-empty">Sem leads</div>' : g[e.key].map(l => {
            const { txt, cls } = tempo(l.created_at);
            return `<div class="k-card" onclick="abrirLead('${l.id}')">
              <div class="k-card-name">${l.nome}</div>
              <div class="k-card-phone">${l.telefone}</div>
              ${l.ambiente ? `<div class="k-card-amb">${l.ambiente}</div>` : ''}
              <div class="k-card-foot">
                <span class="k-card-age ${cls}">${txt}</span>
                <span class="k-tag ${l.agente_ativo?'agente':'consultor'}">${l.agente_ativo?'Agente':'Consultor'}</span>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`).join('')}
    </div>`;
}

// ─── Ao vivo ──────────────────────────────────────────────────────────────────
function renderAoVivo() {
  const lista = [...todos].sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  const nv = lista.filter(l => novas.has(l.id)).length;
  const badge = document.getElementById('badge-vivo');
  badge.textContent = nv; badge.style.display = nv ? 'inline-block' : 'none';
  if (!lista.length) {
    document.getElementById('content').innerHTML = `<div class="empty"><div class="empty-label">Nenhum lead registrado</div></div>`;
    return;
  }
  document.getElementById('content').innerHTML = `
    <div style="font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:14px">${lista.length} lead${lista.length!==1?'s':''} — tempo real</div>
    <div class="ao-vivo-list">${lista.map(l => {
      const { txt, cls } = tempo(l.created_at);
      const isNova = novas.has(l.id);
      return `<div class="conv${isNova?' nova':''}" onclick="abrirLead('${l.id}');novas.delete('${l.id}');renderAoVivo()">
        <div class="conv-av">${l.nome[0]}</div>
        <div class="conv-body">
          <div class="conv-r1">
            <div class="conv-name">${l.nome}</div>
            <span class="badge b-${l.status}">${l.status}</span>
          </div>
          <div class="conv-preview">${l.telefone}${l.ambiente?' · '+l.ambiente:''}</div>
          <div class="conv-meta">
            <span class="conv-age ${cls}">${txt}</span>
            ${l.qualificado?'<span class="conv-qual">Qualificado</span>':''}
            <span style="font-size:9px;font-weight:600;color:${l.agente_ativo?'var(--green)':'var(--amber)'}">
              ${l.agente_ativo?'Agente':'Consultor'}
            </span>
          </div>
        </div>
        ${isNova?'<div class="new-pip"></div>':'<div class="conv-dot '+( diffH(l.created_at)>2?'amber':'green')+'"></div>'}
      </div>`;
    }).join('')}</div>`;
}

// ─── Painel lead ──────────────────────────────────────────────────────────────
function abrirLead(id) {
  leadAtual = todos.find(l => l.id === id); if (!leadAtual) return;
  novas.delete(id);
  document.getElementById('lo').classList.add('open');
  trocarTab('info');
}
function fecharLead() { document.getElementById('lo').classList.remove('open'); leadAtual = null; }

function trocarTab(t) {
  document.querySelectorAll('.lp-tab').forEach((el,i) => el.classList.toggle('active',['info','chat'][i]===t));
  document.querySelectorAll('.lp-body').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${t}`).classList.add('active');
  if (t === 'info') renderInfo();
  if (t === 'chat') { renderChatFoot(); carregarConversas(leadAtual.id).then(renderMsgs); }
}

function renderInfo() {
  if (!leadAtual) return;
  const l = leadAtual;
  document.getElementById('lp-name').textContent = l.nome;
  document.getElementById('lp-badges').innerHTML = `
    <span class="badge b-${l.status}">${l.status}</span>
    ${l.qualificado?'<span class="badge" style="background:var(--green-dim);color:var(--green)">Qualificado</span>':''}
    ${!l.agente_ativo?'<span class="badge" style="background:var(--amber-dim);color:var(--amber)">Consultor ativo</span>':''}`;
  document.getElementById('lp-info').innerHTML = `
    <div class="info-cat">Contato</div>
    <div class="info-grid">
      <div class="ii"><label>Nome</label><p>${l.nome}</p></div>
      <div class="ii"><label>Telefone</label><p><a href="tel:${l.telefone}">${l.telefone}</a></p></div>
      <div class="ii"><label>E-mail</label><p>${l.email?`<a href="mailto:${l.email}">${l.email}</a>`:'—'}</p></div>
      <div class="ii"><label>Origem</label><p>${l.origem||'—'}</p></div>
    </div>
    <div class="info-ruler"></div>
    <div class="info-cat">Qualificação</div>
    <div class="info-grid">
      <div class="ii"><label>Ambiente</label><p>${l.ambiente||'—'}</p></div>
      <div class="ii"><label>Tipo</label><p>${l.tipo_projeto||'—'}</p></div>
      <div class="ii"><label>Orçamento</label><p>${l.orcamento_faixa||'—'}</p></div>
      <div class="ii"><label>Prazo</label><p>${l.prazo_desejado||'—'}</p></div>
    </div>
    <div class="info-ruler"></div>
    <div class="info-cat">Atendimento</div>
    <div class="info-grid">
      <div class="ii full"><label>Status</label>
        <select class="status-sel" onchange="atualizarStatus('${l.id}',this.value)">
          ${ETAPAS.map(e=>`<option value="${e.key}"${l.status===e.key?' selected':''}>${e.label}</option>`).join('')}
        </select>
      </div>
      <div class="ii"><label>Responsável</label><p>${l.agente_ativo?'Agente IA':l.assumido_por||'Consultor'}</p></div>
      <div class="ii"><label>Entrada</label><p>${fmtData(l.created_at)}</p></div>
    </div>
    ${l.mensagem?`<div class="info-ruler"></div><div class="info-cat">Mensagem inicial</div><p style="font-size:12px;color:var(--muted);line-height:1.6">${l.mensagem}</p>`:''}
    <div class="info-ruler"></div>
    <div class="info-cat">Notas internas</div>
    <textarea class="notas" id="notas-inp" placeholder="Observações privadas…">${l.notas_internas||''}</textarea>
    <div class="acoes-row" style="margin-top:6px">
      <button class="btn btn-outline btn-sm" onclick="salvarNotas('${l.id}')">Salvar notas</button>
    </div>
    <div class="info-ruler"></div>
    <div class="info-cat">Ações</div>
    <div class="acoes-row">
      <a class="btn btn-gold btn-sm" href="https://wa.me/55${l.telefone.replace(/\D/g,'')}" target="_blank">

}

function renderChatFoot() {
  if (!leadAtual) return;
  const l = leadAtual;
  const foot = document.getElementById('chat-foot');
  if (l.agente_ativo) {
    foot.innerHTML = `
      <div class="chat-assumir">
        <p>O agente está conduzindo este atendimento automaticamente.</p>
        <button class="btn btn-red" onclick="assumir('${l.id}')">Pausar agente e assumir</button>
      </div>`;
  } else {
    foot.innerHTML = `
      <div class="chat-ctrl">
        <div class="ctrl-label">Você está no controle</div>
        <div class="chat-row">
          <textarea class="chat-inp" id="chat-inp" rows="1" placeholder="Digite e pressione Enter para enviar…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();enviarConsultor('${l.id}')}"></textarea>
          <button class="chat-send" id="chat-send" onclick="enviarConsultor('${l.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div style="margin-top:8px">
          <button class="btn btn-green btn-sm" onclick="devolver('${l.id}')">Devolver ao agente</button>
        </div>
      </div>`;
  }
}

function renderMsgs(cs) {
  const el = document.getElementById('chat-msgs');
  if (!cs.length) { el.innerHTML = '<div class="chat-empty">Nenhuma mensagem ainda</div>'; return; }
  el.innerHTML = cs.map(c => `
    <div class="cm ${c.role}">
      <div class="cm-bub">${c.mensagem.replace(/\n/g,'<br>')}</div>
      <div class="cm-time">${fmtData(c.created_at)}</div>
    </div>`).join('');
  setTimeout(() => { el.scrollTop = el.scrollHeight; }, 40);
}

// ─── Realtime ─────────────────────────────────────────────────────────────────
function initRealtime() {
  sb.channel('leads').on('postgres_changes',{event:'INSERT',schema:'public',table:'leads'},p=>{
    todos.unshift(p.new); renderView();
    beep(); notif(`${p.new.nome}`, p.new.telefone, 'default');
  }).on('postgres_changes',{event:'UPDATE',schema:'public',table:'leads'},p=>{
    const i = todos.findIndex(l=>l.id===p.new.id);
    if (i!==-1) todos[i]=p.new; else todos.unshift(p.new);
    if (leadAtual?.id===p.new.id) { leadAtual=p.new; renderInfo(); }
    renderView();
  }).subscribe();
  sb.channel('conversas').on('postgres_changes',{event:'INSERT',schema:'public',table:'conversas'},p=>{
    novas.add(p.new.lead_id);
    const b = document.getElementById('badge-vivo'); b.textContent=novas.size; b.style.display='inline-block';
    if (leadAtual?.id===p.new.lead_id && document.getElementById('tab-chat').classList.contains('active')) {
      carregarConversas(p.new.lead_id).then(renderMsgs); novas.delete(p.new.lead_id);
    }
    if (p.new.role==='user') beep();
  }).subscribe();
}

// ─── Utilitários ──────────────────────────────────────────────────────────────
function diffH(d) { return (Date.now()-new Date(d))/3600000; }
function tempo(d) {
  const m = Math.floor((Date.now()-new Date(d))/60000);
  const h = Math.floor(m/60), dd = Math.floor(h/24);
  return { txt: dd>0?`${dd}d`:h>0?`${h}h`:`${m}min`, cls: h>=24?'crit':h>=2?'warn':'' };
}
function fmtDiff(d) { return tempo(d).txt; }
function fmtData(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function beep() {
  try {
    const ctx=new AudioContext(),o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.frequency.value=740;
    g.gain.setValueAtTime(0.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+.3);
    o.start();o.stop(ctx.currentTime+.3);
  } catch(_){}
}
function notif(t,b,tipo='default') {
  const wrap=document.getElementById('notif-wrap');
  const el=document.createElement('div');
  el.className=`notif${tipo==='green'?' green':tipo==='red'?' red':''}`;
  el.innerHTML=`<div class="notif-t">${t}</div>${b?`<div class="notif-b">${b}</div>`:''}`;
  wrap.prepend(el);
  setTimeout(()=>el.remove(),4000);
}
function exportarCSV() {
  const cols=['nome','telefone','email','ambiente','tipo_projeto','orcamento_faixa','prazo_desejado','status','qualificado','created_at'];
  const blob=new Blob([cols.join(';')+'\n'+todos.map(l=>cols.map(c=>`"${(l[c]??'').toString().replace(/"/g,'""')}"`).join(';')).join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`realizzare-leads-${new Date().toISOString().slice(0,10)}.csv`;a.click();
}
setInterval(()=>{
  document.getElementById('clock').textContent=new Date().toLocaleString('pt-BR');
},1000);

(async()=>{
  if(!await initAuth())return;
  await carregarLeads();
  initRealtime();
})();
</script>
