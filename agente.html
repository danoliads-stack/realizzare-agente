<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRM Agente — Realizzare</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#141414;--s1:#1e1e1e;--s2:#272727;--s3:#303030;
  --border:#2e2e2e;--border2:#3a3a3a;
  --gold:#c9a84c;--gold2:#f0c040;--gold-dim:rgba(201,168,76,.12);
  --text:#e8e8e8;--muted:#777;--muted2:#555;
  --green:#52c07a;--red:#e05252;--orange:#e0993a;--blue:#5ba4f5;
  --green-dim:rgba(82,192,122,.12);--red-dim:rgba(224,82,82,.12);--orange-dim:rgba(224,153,58,.12);
}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:14px;display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ─────────────────────────────────────────────── */
.sidebar{width:220px;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo .name{font-size:15px;font-weight:700;letter-spacing:2.5px;color:var(--gold);text-transform:uppercase}
.sidebar-logo .sub{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:2px}
.sidebar-badge{display:inline-flex;align-items:center;gap:5px;background:var(--gold-dim);border:1px solid rgba(201,168,76,.2);color:var(--gold);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:20px;margin-top:8px}
.sidebar-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
nav{flex:1;padding:12px 10px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;transition:.15s;position:relative;user-select:none}
.nav-item:hover{background:var(--s2);color:var(--text)}
.nav-item.active{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(201,168,76,.2)}
.nav-icon{font-size:16px;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.sidebar-footer{padding:12px 10px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(201,168,76,.3);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:12px;font-weight:700;flex-shrink:0}
.user-email{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-sair{width:100%;margin-top:6px;background:transparent;border:1px solid var(--border2);border-radius:7px;color:var(--muted);font-size:12px;padding:7px;cursor:pointer;transition:.15s}
.btn-sair:hover{border-color:var(--red);color:var(--red)}

/* ── Main ────────────────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--s1);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;flex:1}
.topbar-time{font-size:11px;color:var(--muted)}
.content{flex:1;overflow-y:auto;padding:24px}

/* ── Botões ──────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.btn-gold{background:var(--gold);color:#111}
.btn-gold:hover{background:var(--gold2)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--muted)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-green{background:var(--green-dim);border:1px solid rgba(82,192,122,.3);color:var(--green)}
.btn-red{background:var(--red-dim);border:1px solid rgba(224,82,82,.3);color:var(--red)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── KPI Cards ───────────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.kpi-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.kpi-val{font-size:26px;font-weight:800;line-height:1}
.kpi-val.gold{color:var(--gold)}
.kpi-val.green{color:var(--green)}
.kpi-val.red{color:var(--red)}
.kpi-val.orange{color:var(--orange)}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:4px}
.kpi-trend{font-size:10px;margin-top:6px}
.kpi-trend.up{color:var(--green)}
.kpi-trend.down{color:var(--red)}

/* ── Seção ───────────────────────────────────────────────── */
.section{background:var(--s1);border:1px solid var(--border);border-radius:10px;margin-bottom:20px;overflow:hidden}
.section-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.section-title{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
.section-body{padding:16px 18px}

/* ── Funil ───────────────────────────────────────────────── */
.funil{display:flex;gap:4px;align-items:flex-end}
.funil-col{flex:1;text-align:center}
.funil-bar-wrap{height:56px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:6px}
.funil-bar{width:100%;border-radius:3px 3px 0 0;background:linear-gradient(to top,var(--gold),rgba(201,168,76,.25));min-height:3px}
.funil-n{font-size:15px;font-weight:800;color:var(--gold)}
.funil-lbl{font-size:9px;color:var(--muted);letter-spacing:.5px;margin-top:2px}
.funil-sep{color:var(--border2);padding-bottom:30px;font-size:14px;flex-shrink:0}

/* ── Feed atividade ──────────────────────────────────────── */
.feed{display:flex;flex-direction:column;gap:2px}
.feed-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.feed-item:last-child{border-bottom:none}
.feed-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.feed-dot.green{background:var(--green)}
.feed-dot.gold{background:var(--gold)}
.feed-dot.blue{background:var(--blue)}
.feed-dot.red{background:var(--red)}
.feed-text{flex:1;font-size:12px;line-height:1.4;color:var(--text)}
.feed-text strong{color:var(--gold)}
.feed-time{font-size:10px;color:var(--muted);white-space:nowrap;margin-top:1px}

/* ── Alertas ─────────────────────────────────────────────── */
.alerta{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:.15s}
.alerta:hover{filter:brightness(1.1)}
.alerta.vermelho{background:var(--red-dim);border:1px solid rgba(224,82,82,.25)}
.alerta.laranja{background:var(--orange-dim);border:1px solid rgba(224,153,58,.25)}
.alerta-icon{font-size:16px;flex-shrink:0}
.alerta-body{flex:1}
.alerta-nome{font-size:12px;font-weight:600}
.alerta-detalhe{font-size:11px;color:var(--muted)}
.alerta-tempo{font-size:11px;font-weight:700}
.alerta.vermelho .alerta-tempo{color:var(--red)}
.alerta.laranja .alerta-tempo{color:var(--orange)}

/* ── Kanban ──────────────────────────────────────────────── */
.kanban-wrap{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;min-height:500px}
.kanban-col{background:var(--s1);border:1px solid var(--border);border-radius:10px;width:240px;flex-shrink:0;display:flex;flex-direction:column;max-height:calc(100vh - 160px)}
.kanban-col-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.kanban-col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kanban-col-name{font-size:12px;font-weight:700;flex:1}
.kanban-col-count{background:var(--s3);color:var(--muted);font-size:11px;font-weight:700;padding:1px 7px;border-radius:10px}
.kanban-cards{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.kanban-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:.15s}
.kanban-card:hover{border-color:var(--gold);transform:translateY(-1px)}
.kanban-card-nome{font-size:13px;font-weight:700;margin-bottom:4px}
.kanban-card-tel{font-size:11px;color:var(--muted);margin-bottom:6px}
.kanban-card-amb{display:inline-flex;align-items:center;gap:4px;background:var(--gold-dim);color:var(--gold);font-size:10px;padding:2px 7px;border-radius:10px;margin-bottom:8px}
.kanban-card-footer{display:flex;align-items:center;justify-content:space-between}
.kanban-card-tempo{font-size:10px;color:var(--muted)}
.kanban-card-tempo.alerta{color:var(--orange)}
.kanban-card-tempo.critico{color:var(--red)}
.badge-agente{display:inline-flex;align-items:center;gap:4px;font-size:9px;color:var(--green);letter-spacing:.5px}
.badge-agente::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 4px var(--green)}
.badge-consultor{display:inline-flex;align-items:center;gap:4px;font-size:9px;color:var(--orange);letter-spacing:.5px}
.badge-consultor::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--orange)}
.kanban-empty{text-align:center;padding:30px 10px;color:var(--muted2);font-size:12px}

/* ── Ao vivo ─────────────────────────────────────────────── */
.ao-vivo-grid{display:flex;flex-direction:column;gap:8px}
.conv-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:.15s;display:flex;gap:12px;align-items:flex-start}
.conv-card:hover{border-color:var(--gold)}
.conv-card.nova{border-color:var(--green);animation:pulse-border 1.5s infinite}
@keyframes pulse-border{0%,100%{border-color:var(--green)}50%{border-color:rgba(82,192,122,.3)}}
.conv-avatar{width:38px;height:38px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--gold);flex-shrink:0;text-transform:uppercase}
.conv-body{flex:1;min-width:0}
.conv-row1{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.conv-nome{font-size:13px;font-weight:700}
.conv-status-badge{font-size:9px;padding:1px 7px;border-radius:10px;font-weight:700}
.conv-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.conv-meta{display:flex;align-items:center;gap:8px}
.conv-tempo{font-size:10px;color:var(--muted)}
.conv-tempo.alerta{color:var(--orange)}
.conv-tempo.critico{color:var(--red)}
.conv-qual{font-size:9px;color:var(--green);font-weight:600}
.conv-new-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:4px;box-shadow:0 0 6px var(--green)}
.ao-vivo-empty{text-align:center;padding:60px 20px;color:var(--muted)}
.ao-vivo-empty .icon{font-size:48px;margin-bottom:12px}

/* ── Painel Lead (direita) ───────────────────────────────── */
.lead-overlay{position:fixed;inset:0;z-index:200;display:none}
.lead-overlay.open{display:flex;justify-content:flex-end}
.lead-backdrop{flex:1;background:rgba(0,0,0,.5);backdrop-filter:blur(2px)}
.lead-panel{width:520px;background:var(--s1);border-left:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.lead-panel-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.lead-panel-nome{flex:1;font-size:16px;font-weight:700}
.lead-panel-tabs{display:flex;gap:2px;padding:0 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.lead-tab{padding:10px 14px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.lead-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.lead-tab-content{flex:1;overflow-y:auto;display:none}
.lead-tab-content.active{display:flex;flex-direction:column}

/* Info do lead */
.lead-info{padding:20px}
.info-section-title{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;margin-top:16px}
.info-section-title:first-child{margin-top:0}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-item label{font-size:10px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.info-item p{font-size:13px;margin-top:2px}
.info-item.full{grid-column:1/-1}
.status-sel{background:var(--s2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;padding:6px 10px;width:100%;outline:none;cursor:pointer}
.status-sel:focus{border-color:var(--gold)}
.notas-area{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;padding:10px 12px;resize:none;outline:none;font-family:inherit;min-height:80px;margin-top:6px}
.notas-area:focus{border-color:var(--gold)}
.btn-salvar-notas{margin-top:6px}

/* Chat */
.chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;background:var(--bg)}
.chat-msg{max-width:78%}
.chat-msg.agent{align-self:flex-start}
.chat-msg.user{align-self:flex-end}
.chat-bubble{padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.5;word-break:break-word}
.chat-msg.agent .chat-bubble{background:var(--s2);border-bottom-left-radius:3px}
.chat-msg.user .chat-bubble{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.2);border-bottom-right-radius:3px}
.chat-time{font-size:10px;color:var(--muted);margin-top:3px;padding:0 3px}
.chat-msg.user .chat-time{text-align:right}
.chat-footer{padding:14px 16px;border-top:1px solid var(--border);background:var(--s1);flex-shrink:0}
.chat-assumir{text-align:center;padding:16px}
.chat-input-wrap{display:flex;gap:8px}
.chat-input{flex:1;background:var(--s2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;padding:9px 12px;outline:none;font-family:inherit;resize:none;max-height:100px}
.chat-input:focus{border-color:var(--gold)}
.chat-send{background:var(--gold);color:#111;border:none;border-radius:8px;padding:9px 14px;cursor:pointer;font-size:16px;transition:.15s;flex-shrink:0}
.chat-send:hover{background:var(--gold2)}
.chat-send:disabled{opacity:.4;cursor:not-allowed}
.chat-consultor-label{font-size:11px;color:var(--orange);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.chat-consultor-label::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--orange)}
.chat-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}

/* ── Badges de status ────────────────────────────────────── */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.b-novo{background:rgba(120,120,120,.15);color:#999}
.b-atendimento{background:var(--gold-dim);color:var(--gold)}
.b-qualificado{background:var(--green-dim);color:var(--green)}
.b-agendado{background:rgba(82,192,122,.25);color:var(--green)}
.b-proposta{background:rgba(91,164,245,.12);color:var(--blue)}
.b-fechado{background:rgba(82,192,122,.4);color:#0a2a15;font-weight:800}
.b-perdido{background:var(--red-dim);color:var(--red)}

/* ── Loading / Empty ─────────────────────────────────────── */
.loading{text-align:center;padding:48px;color:var(--muted);font-size:13px}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .eicon{font-size:48px;margin-bottom:12px}

/* ── Notif ───────────────────────────────────────────────── */
.notif-wrap{position:fixed;top:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:8px}
.notif{background:var(--s1);border:1px solid var(--gold);border-radius:10px;padding:12px 16px;max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideIn .25s ease}
.notif.red{border-color:var(--red)}
.notif.green{border-color:var(--green)}
.notif-title{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:2px}
.notif.red .notif-title{color:var(--red)}
.notif.green .notif-title{color:var(--green)}
.notif-body{font-size:11px;color:var(--muted)}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── Scrollbar ───────────────────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="name">Realizzare</div>
    <div class="sub">Planejados</div>
    <div class="sidebar-badge">Agente IA</div>
  </div>
  <nav>
    <div class="nav-item active" data-view="dashboard" onclick="trocarView('dashboard')">
      <span class="nav-icon">📊</span> Dashboard
    </div>
    <div class="nav-item" data-view="kanban" onclick="trocarView('kanban')">
      <span class="nav-icon">🗂</span> Kanban
    </div>
    <div class="nav-item" data-view="ao-vivo" onclick="trocarView('ao-vivo')">
      <span class="nav-icon">⚡</span> Ao vivo
      <span class="nav-badge" id="badge-ao-vivo" style="display:none">0</span>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="user-row">
      <div class="user-avatar" id="user-avatar">?</div>
      <div class="user-email" id="user-email">—</div>
    </div>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">Dashboard</div>
    <div class="topbar-time" id="topbar-time"></div>
    <button class="btn btn-outline btn-sm" onclick="exportarCSV()">⬇ CSV</button>
  </div>

  <div class="content" id="content">
    <div class="loading">Carregando…</div>
  </div>
</div>

<!-- Painel Lead (direita) -->
<div class="lead-overlay" id="lead-overlay">
  <div class="lead-backdrop" onclick="fecharLead()"></div>
  <div class="lead-panel">
    <div class="lead-panel-head">
      <div>
        <div class="lead-panel-nome" id="lp-nome">—</div>
        <div style="margin-top:4px" id="lp-badges"></div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="fecharLead()">✕</button>
    </div>
    <div class="lead-panel-tabs">
      <div class="lead-tab active" onclick="trocarTab('info')">Informações</div>
      <div class="lead-tab" onclick="trocarTab('chat')">Conversa</div>
    </div>
    <div class="lead-tab-content active" id="tab-info">
      <div class="lead-info" id="lp-info"></div>
    </div>
    <div class="lead-tab-content" id="tab-chat" style="flex-direction:column">
      <div class="chat-area" id="chat-area"></div>
      <div class="chat-footer" id="chat-footer"></div>
    </div>
  </div>
</div>

<!-- Notificações -->
<div class="notif-wrap" id="notif-wrap"></div>

<script>

const ETAPAS = [

// ─── Auth ─────────────────────────────────────────────────────────────────────
async function initAuth() {
  const { data } = await sb.auth.getSession();
  if (!data.session) { window.location.href = 'agente-login.html'; return false; }
  sessao = data.session;
  const email = sessao.user.email;
  document.getElementById('user-email').textContent = email;
  document.getElementById('user-avatar').textContent = email[0].toUpperCase();
  return true;
}
function sair() { sb.auth.signOut().then(() => window.location.href = 'agente-login.html'); }

// ─── Dados ────────────────────────────────────────────────────────────────────
async function carregarLeads() {
  const { data } = await sb.from('leads').select('*').order('created_at', { ascending: false });
  todos = data || [];
  renderView();
}

async function carregarConversas(leadId) {
  const { data } = await sb.from('conversas').select('*').eq('lead_id', leadId).order('created_at', { ascending: true });
  return data || [];
}

async function atualizarStatus(id, status) {
  await sb.from('leads').update({ status }).eq('id', id);
  const l = todos.find(x => x.id === id); if (l) l.status = status;
  renderView();
  notif('Status atualizado', status, 'green');
}

async function salvarNotas(id, notas) {
  await sb.from('leads').update({ notas_internas: notas }).eq('id', id);
  notif('Notas salvas', '', 'green');
}

async function assumirAtendimento(id) {
  await sb.from('leads').update({ agente_ativo: false, assumido_por: sessao.user.email, assumido_em: new Date().toISOString() }).eq('id', id);
  const l = todos.find(x => x.id === id);
  if (l) { l.agente_ativo = false; l.assumido_por = sessao.user.email; }
  renderChat();
  renderLeadInfo();
  notif('Atendimento assumido', 'O agente foi pausado para esse lead.', 'gold');
}

async function devolverAgente(id) {
  await sb.from('leads').update({ agente_ativo: true, assumido_por: null, assumido_em: null }).eq('id', id);
  const l = todos.find(x => x.id === id);
  if (l) { l.agente_ativo = true; l.assumido_por = null; }
  renderChat();
  renderLeadInfo();
  notif('Agente reativado', 'O agente voltará a responder.', 'green');
}

async function enviarMensagemConsultor(leadId, mensagem) {
  const res = await fetch(`${WORKER_URL}/enviar-mensagem`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ lead_id: leadId, mensagem }),
  });
  if (!res.ok) { notif('Erro ao enviar', 'Verifique a Evolution API.', 'red'); return false; }
  return true;
}

// ─── Views ────────────────────────────────────────────────────────────────────
function trocarView(view) {
  viewAtual = view;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === view));
  const titles = { dashboard: 'Dashboard', kanban: 'Kanban', 'ao-vivo': 'Ao vivo' };
  document.getElementById('topbar-title').textContent = titles[view] || view;
  renderView();
}

function renderView() {
  if (viewAtual === 'dashboard') renderDashboard();
  else if (viewAtual === 'kanban') renderKanban();
  else if (viewAtual === 'ao-vivo') renderAoVivo();
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function renderDashboard() {
  const agora = new Date();
  const hoje = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate());
  const mes = new Date(agora.getFullYear(), agora.getMonth(), 1);

  const total      = todos.length;
  const domes      = todos.filter(l => new Date(l.created_at) >= mes).length;
  const dohoje     = todos.filter(l => new Date(l.created_at) >= hoje).length;
  const qual       = todos.filter(l => l.qualificado).length;
  const agenda     = todos.filter(l => l.status === 'agendado').length;
  const fechados   = todos.filter(l => l.status === 'fechado').length;
  const ativos     = todos.filter(l => l.agente_ativo).length;
  const taxa       = total > 0 ? Math.round((qual / total) * 100) : 0;
  const semResp    = todos.filter(l => l.agente_ativo && diffH(l.created_at) > 2);

  const qualTempo = todos.filter(l => l.qualificado && l.first_response_at);
  let tMedio = '—';
  if (qualTempo.length) {
    const soma = qualTempo.reduce((a,l) => a + (new Date(l.first_response_at) - new Date(l.created_at)), 0);
    const m = Math.round(soma / qualTempo.length / 60000);
    tMedio = m < 60 ? `${m}min` : `${Math.round(m/60)}h`;
  }

  // Atividade recente (últimos 15 leads ordenados)
  const recentes = [...todos].slice(0, 15);

  // Alertas
  const criticos = todos.filter(l => l.agente_ativo && diffH(l.created_at) > 24);
  const alertas  = todos.filter(l => l.agente_ativo && diffH(l.created_at) > 2 && diffH(l.created_at) <= 24);

  document.getElementById('content').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Leads hoje</div><div class="kpi-val gold">${dohoje}</div></div>
      <div class="kpi"><div class="kpi-label">Este mês</div><div class="kpi-val">${domes}</div></div>
      <div class="kpi"><div class="kpi-label">Agente ativo</div><div class="kpi-val green">${ativos}</div><div class="kpi-sub">conversas em andamento</div></div>
      <div class="kpi"><div class="kpi-label">Qualificados</div><div class="kpi-val gold">${qual}</div></div>
      <div class="kpi"><div class="kpi-label">Visitas agendadas</div><div class="kpi-val green">${agenda}</div></div>
      <div class="kpi"><div class="kpi-label">Fechados</div><div class="kpi-val green">${fechados}</div></div>
      <div class="kpi"><div class="kpi-label">Taxa conversão</div><div class="kpi-val gold">${taxa}%</div></div>
      <div class="kpi"><div class="kpi-label">Tempo médio qualif.</div><div class="kpi-val">${tMedio}</div></div>
    </div>

    <div class="section" style="margin-bottom:20px">
      <div class="section-head"><span class="section-title">Funil</span></div>
      <div class="section-body">
        <div class="funil">${renderFunilHTML()}</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="section">
        <div class="section-head">
          <span class="section-title">⚠️ Alertas (${semResp.length} sem resposta)</span>
        </div>
        <div class="section-body" style="padding:12px 16px">
          ${criticos.map(l => `
            <div class="alerta vermelho" onclick="abrirLead('${l.id}')">
              <div class="alerta-icon">🔴</div>
              <div class="alerta-body">
                <div class="alerta-nome">${l.nome}</div>
                <div class="alerta-detalhe">${l.telefone}${l.ambiente ? ' · ' + l.ambiente : ''}</div>
              </div>
              <div class="alerta-tempo">${fmtDiff(l.created_at)}</div>
            </div>`).join('')}
          ${alertas.map(l => `
            <div class="alerta laranja" onclick="abrirLead('${l.id}')">
              <div class="alerta-icon">🟡</div>
              <div class="alerta-body">
                <div class="alerta-nome">${l.nome}</div>
                <div class="alerta-detalhe">${l.telefone}${l.ambiente ? ' · ' + l.ambiente : ''}</div>
              </div>

function renderFunilHTML() {
  const cont = {};
  ETAPAS.forEach(e => { cont[e.key] = 0; });
  todos.forEach(l => { if (cont[l.status] !== undefined) cont[l.status]++; });
  const max = Math.max(...Object.values(cont), 1);
  return ETAPAS.map((e, i) => {
    const n = cont[e.key];
    const h = Math.max(3, Math.round((n / max) * 52));
    const sep = i < ETAPAS.length - 1 ? '<div class="funil-sep">›</div>' : '';
    return `<div class="funil-col"><div class="funil-bar-wrap"><div class="funil-bar" style="height:${h}px"></div></div><div class="funil-n">${n}</div><div class="funil-lbl">${e.label}</div></div>${sep}`;
  }).join('');
}

function renderMensagens(conversas) {
  const area = document.getElementById('chat-area');
  if (!conversas.length) {
    area.innerHTML = '<div class="chat-empty">Nenhuma mensagem ainda</div>';
    return;
  }
  area.innerHTML = conversas.map(c => `
    <div class="chat-msg ${c.role}">
      <div class="chat-bubble">${c.mensagem.replace(/\n/g,'<br>')}</div>
      <div class="chat-time">${fmtData(c.created_at)}</div>
    </div>`).join('');
  setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
}

function chatKeyDown(e, leadId) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarChat(leadId); }
}

async function enviarChat(leadId) {
  const input = document.getElementById('chat-input');
  const btn = document.getElementById('chat-send-btn');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  btn.disabled = true;
  const ok = await enviarMensagemConsultor(leadId, msg);
  btn.disabled = false;
  if (ok) {
    const conversas = await carregarConversas(leadId);
    renderMensagens(conversas);
  }
}

// ─── Realtime ─────────────────────────────────────────────────────────────────
function iniciarRealtime() {
  sb.channel('leads-rt')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'leads' }, p => {
      todos.unshift(p.new);
      renderView();
      tocarSom();
      notif('🔔 Novo lead!', `${p.new.nome} — ${p.new.telefone}`, 'gold');
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'leads' }, p => {
      const i = todos.findIndex(l => l.id === p.new.id);
      if (i !== -1) todos[i] = p.new; else todos.unshift(p.new);
      if (leadAtual?.id === p.new.id) { leadAtual = p.new; renderLeadInfo(); }
      renderView();
    })
    .subscribe();

  sb.channel('conversas-rt')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'conversas' }, p => {
      novasMensagens.add(p.new.lead_id);
      const badge = document.getElementById('badge-ao-vivo');
      badge.textContent = novasMensagens.size;
      badge.style.display = 'inline-block';
      if (leadAtual?.id === p.new.lead_id && document.getElementById('tab-chat').classList.contains('active')) {
        carregarConversas(p.new.lead_id).then(renderMensagens);
        novasMensagens.delete(p.new.lead_id);
      }
      if (p.new.role === 'user') tocarSom();
    })
    .subscribe();
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function diffH(d) { return (Date.now() - new Date(d)) / 3600000; }
function tempo(d) {
  const min = Math.floor((Date.now() - new Date(d)) / 60000);
  const h = Math.floor(min / 60); const dd = Math.floor(h / 24);
  const txt = dd > 0 ? `${dd}d` : h > 0 ? `${h}h` : `${min}min`;
  const cls = h >= 24 ? 'critico' : h >= 2 ? 'alerta' : '';
  return { txt, cls };
}
function fmtDiff(d) { return tempo(d).txt; }
function fmtData(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}
function classeBadge(s) {
  return ({ novo:'b-novo', atendimento:'b-atendimento', qualificado:'b-qualificado', agendado:'b-agendado', proposta:'b-proposta', fechado:'b-fechado', perdido:'b-perdido' })[s] || 'b-novo';
}

function tocarSom() {
  try {
    const ctx = new AudioContext();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880; g.gain.setValueAtTime(0.2, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
    o.start(); o.stop(ctx.currentTime + 0.35);
  } catch(_) {}
}

let notifTimer;
function notif(titulo, corpo, tipo = 'gold') {
  clearTimeout(notifTimer);
  const wrap = document.getElementById('notif-wrap');
  const el = document.createElement('div');
  el.className = `notif ${tipo}`;
  el.innerHTML = `<div class="notif-title">${titulo}</div>${corpo?`<div class="notif-body">${corpo}</div>`:''}`;
  wrap.prepend(el);
  notifTimer = setTimeout(() => { el.remove(); }, 4000);
}

function exportarCSV() {
  const cols = ['nome','telefone','email','ambiente','tipo_projeto','orcamento_faixa','prazo_desejado','status','qualificado','created_at'];
  const blob = new Blob([cols.join(';')+'\n'+todos.map(l=>cols.map(c=>`"${(l[c]??'').toString().replace(/"/g,'""')}"`).join(';')).join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `leads-${new Date().toISOString().slice(0,10)}.csv`; a.click();
}
